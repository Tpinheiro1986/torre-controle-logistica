<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Logística</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0ede6;--text2:#a0a09a;--text3:#6b6b67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5}

/* LOGIN */
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:18px;padding:44px 48px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.08)}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.brand-icon{width:38px;height:38px;background:#185FA5;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-size:14px;font-weight:700;color:var(--text)}
.brand-sub{font-size:11px;color:var(--text2);margin-top:1px}
.login-title{font-size:22px;font-weight:700;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.form-input{width:100%;padding:10px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.10)}
.btn-primary{width:100%;padding:11px;background:#185FA5;color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:6px}
.btn-primary:hover{background:#0C447C}
.btn-primary:disabled{background:#888;cursor:not-allowed}
.login-err{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F7C1C1;border-radius:var(--radius);padding:10px 14px;font-size:12px;margin-top:10px;display:none}

/* APP LAYOUT */
#screen-app{display:none}
.topnav{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 32px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-icon{width:30px;height:30px;background:#185FA5;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-icon svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-size:14px;font-weight:700}
.nav-sub{font-size:10px;color:var(--text2);margin-top:1px}
.nav-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:4px 12px 4px 4px}
.user-av{width:24px;height:24px;border-radius:50%;background:#185FA5;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.user-em{font-size:11px;color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-sm{font-size:11px;padding:4px 10px;border-radius:14px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.btn-sm:hover{background:var(--bg2)}
.admin-badge{font-size:10px;padding:3px 8px;border-radius:12px;background:#E6F1FB;color:#0C447C;font-weight:500}

/* TABS */
.tabs{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab{font-size:13px;padding:12px 18px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}

/* CONTAINER & SECTIONS */
.container{max-width:1400px;margin:0 auto;padding:28px 32px}
.dash-section, .upload-section{display:none}
.dash-section.on, .upload-section.on{display:block}

/* KPI & CARDS */
.krow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.kpi-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:12px}

/* UPLOAD BOXES */
.upload-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:20px}
.upload-box{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:24px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-box:hover{border-color:#185FA5;background:#E6F1FB20}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state svg{width:48px;height:48px;margin:0 auto 16px;display:block;opacity:.3}
</style>
</head>
<body>

<div id="screen-login">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="brand-name">Torre de Controle</div><div class="brand-sub">Logística · Genomma Lab</div></div>
    </div>
    <div class="login-title">Bem-vindo</div>
    <div class="login-sub">Acesse com seu e-mail corporativo.</div>
    <div class="form-group"><label class="form-label">E-mail</label><input class="form-input" type="email" id="l-email" placeholder="seu@genommalab.com"/></div>
    <div class="form-group"><label class="form-label">Senha</label><input class="form-input" type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="screen-app">
  <div class="topnav">
    <div class="nav-brand">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="nav-title">Torre de Controle</div><div class="nav-sub">Logística · Genomma Lab</div></div>
    </div>
    <div class="nav-right">
      <span class="admin-badge" id="admin-badge" style="display:none">Admin</span>
      <div class="user-chip"><div class="user-av" id="user-av">?</div><span class="user-em" id="user-em">—</span></div>
      <button class="btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="tabs" id="tabs-bar">
    <div class="tab on" onclick="switchTab('otd',this)">OTD</div>
    <div class="tab" onclick="switchTab('custo',this)">Custo de Servir</div>
    <div class="tab" onclick="switchTab('estoque',this)">Estoque</div>
    <div id="tab-upload" class="tab" style="display:none;margin-left:auto;color:#185FA5;" onclick="switchTab('upload',this)">⬆ Upload</div>
  </div>

  <div class="container">
    <div class="dash-section on" id="sec-otd">
       <div class="empty-state">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <p>Dashboard de OTD</p>
      </div>
    </div>

    <div class="dash-section" id="sec-custo">
       <div class="empty-state"><p>Conteúdo de Custo de Servir</p></div>
    </div>

    <div class="dash-section" id="sec-estoque">
       <div class="empty-state"><p>Conteúdo de Estoque</p></div>
    </div>

    <div class="upload-section" id="sec-upload">
      <div class="card">
        <h3>Upload de Bases</h3>
        <div class="upload-grid">
           <div class="upload-box">
             <input type="file" onchange="console.log('Arquivo selecionado')">
             <p>Arraste o Excel aqui</p>
           </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ennsbpibfnuwlvtodukg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_ExShUMyhsoGRab_RdySuZg_1uqONyI5';
const ADMIN_EMAIL = 'thiago_balao@yahoo.com.br';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp(session.user);
  else showLogin();
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-err');

  if (!email || !pass) {
    showErr(err, 'Preencha e-mail e senha.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showErr(err, 'Falha no login: ' + error.message);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  } else {
    showApp(data.user);
  }
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

function showLogin() {
  document.getElementById('screen-login').style.display = 'flex';
  document.getElementById('screen-app').style.display = 'none';
}

function showApp(user) {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('user-em').textContent = user.email;
  document.getElementById('user-av').textContent = user.email.charAt(0).toUpperCase();

  if (user.email === ADMIN_EMAIL) {
    document.getElementById('tab-upload').style.display = 'block';
    document.getElementById('admin-badge').style.display = 'inline-block';
  }
}

function switchTab(tabName, element) {
  // Esconde todas as seções
  document.querySelectorAll('.dash-section, .upload-section').forEach(sec => {
    sec.classList.remove('on');
  });
  // Remove classe ativa de todas as abas
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));

  // Ativa a seção e a aba correta
  const targetId = 'sec-' + tabName;
  document.getElementById(targetId).classList.add('on');
  element.classList.add('on');
}

function showErr(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
}

// Inicia o app
checkSession();
</script>
</body>
</html>
