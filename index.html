<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Logística</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --radius:8px;--radius-lg:14px;--blue:#185FA5;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0ede6;--text2:#a0a09a;--text3:#6b6b67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5}

/* LOGIN */
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:18px;padding:44px 48px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.08)}
.btn-primary{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer;margin-top:10px}

/* APP */
#screen-app{display:none}
.topnav{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 32px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tabs{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 32px;display:flex}
.tab{padding:12px 18px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}

/* DASHBOARD */
.container{max-width:1400px;margin:0 auto;padding:28px 32px}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px}
.kpi-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-size:24px;font-weight:700}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}

/* UPLOAD BOX */
.upload-section{display:none}.upload-section.on{display:block}
.upload-box{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:0.3s;position:relative}
.upload-box:hover{border-color:var(--blue);background:rgba(24,95,165,0.05)}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
</style>
</head>
<body>

<div id="screen-login">
    <div class="login-card">
        <h2 style="margin-bottom:20px">Torre de Controle</h2>
        <input type="email" id="l-email" placeholder="E-mail" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc">
        <input type="password" id="l-pass" placeholder="Senha" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc">
        <button class="btn-primary" onclick="doLogin()">Entrar</button>
        <p id="login-err" style="color:red;display:none;margin-top:10px"></p>
    </div>
</div>

<div id="screen-app">
    <div class="topnav">
        <strong>Genomma Lab Logística</strong>
        <button onclick="doLogout()" style="background:none;border:none;cursor:pointer;color:var(--text2)">Sair</button>
    </div>
    <div class="tabs">
        <div class="tab on" onclick="switchTab('otd',this)">Painel OTD</div>
        <div id="tab-upload" class="tab" style="display:none" onclick="switchTab('upload',this)">⬆ Upload de Dados</div>
    </div>

    <div class="container">
        <div id="sec-otd" class="dash-section on">
            <div class="krow">
                <div class="kpi"><div class="kpi-lbl">Total Faturado</div><div class="kpi-val" id="kpi-fat">R$ 0,00</div></div>
                <div class="kpi"><div class="kpi-lbl">On Time</div><div class="kpi-val" id="kpi-on" style="color:green">0</div></div>
                <div class="kpi"><div class="kpi-lbl">Off Time</div><div class="kpi-val" id="kpi-off" style="color:red">0</div></div>
                <div class="kpi"><div class="kpi-lbl">OTD Geral</div><div class="kpi-val" id="kpi-otd">0%</div></div>
            </div>
            <div class="card">
                <canvas id="otdChart" height="100"></canvas>
            </div>
        </div>

        <div id="sec-upload" class="upload-section">
            <div class="card">
                <h3>Atualizar Base de Dados</h3>
                <p style="margin-bottom:20px">Selecione o arquivo Excel exportado do sistema (grid-atividade-entrega.xlsx)</p>
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input" accept=".xlsx">
                    <p id="file-name">Arraste o arquivo aqui ou clique para selecionar</p>
                </div>
                <button class="btn-primary" id="btn-process" style="width:200px;margin-top:20px" onclick="processarExcel()">Processar Agora</button>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ennsbpibfnuwlvtodukg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_ExShUMyhsoGRab_RdySuZg_1uqONyI5';
const ADMIN_EMAIL = 'thiago_balao@yahoo.com.br';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let rawData = [];
let chartInstance = null;

// --- AUTH ---
async function doLogin() {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { document.getElementById('login-err').textContent = error.message; document.getElementById('login-err').style.display='block'; }
}

function showApp(user) {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-app').style.display = 'block';
    if(user.email === ADMIN_EMAIL) document.getElementById('tab-upload').style.display = 'block';
}

async function doLogout() { await sb.auth.signOut(); location.reload(); }

function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    el.classList.add('on');
    document.querySelectorAll('.dash-section, .upload-section').forEach(s => s.classList.remove('on'));
    document.getElementById('sec-' + id).classList.add('on');
}

// --- PROCESSAMENTO EXCEL ---
document.getElementById('file-input').addEventListener('change', function(e) {
    if(e.target.files[0]) document.getElementById('file-name').textContent = e.target.files[0].name;
});

function processarExcel() {
    const file = document.getElementById('file-input').files[0];
    if(!file) { alert("Selecione um arquivo primeiro!"); return; }

    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const firstSheet = workbook.SheetNames[0];
        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
        
        atualizarDashboards(jsonData);
        alert("Dados processados com sucesso!");
        switchTab('otd', document.querySelector('.tab'));
    };
    reader.readAsArrayBuffer(file);
}

function atualizarDashboards(data) {
    let totalFat = 0;
    let onTime = 0;
    let offTime = 0;

    data.forEach(row => {
        // Ajuste os nomes das colunas conforme sua planilha real
        const valor = parseFloat(row['Valor'] || row['Faturamento'] || 0);
        totalFat += valor;

        const status = row['Status OTD'] || row['Status'];
        if(status === 'No Prazo' || status === 'On Time') onTime++;
        else offTime++;
    });

    const otdPerc = data.length > 0 ? ((onTime / data.length) * 100).toFixed(1) : 0;

    document.getElementById('kpi-fat').textContent = 'R$ ' + totalFat.toLocaleString('pt-BR');
    document.getElementById('kpi-on').textContent = onTime;
    document.getElementById('kpi-off').textContent = offTime;
    document.getElementById('kpi-otd').textContent = otdPerc + '%';

    renderChart(onTime, offTime);
}

function renderChart(on, off) {
    const ctx = document.getElementById('otdChart').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['On Time', 'Off Time'],
            datasets: [{
                label: 'Entregas',
                data: [on, off],
                backgroundColor: ['#3B6D11', '#A32D2D']
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

sb.auth.onAuthStateChange((event, session) => { if (session) showApp(session.user); });
</script>
</body>
</html>
