<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Logística</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* MANTENDO EXATAMENTE O SEU CSS ORIGINAL */
:root{ --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8; --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97; --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18); --radius:8px;--radius-lg:14px; --blue-gen:#185FA5; }
@media(prefers-color-scheme:dark){ :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--text:#f0ede6;--text2:#a0a09a;--text3:#6b6b67;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);} }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5}
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--bg);border:0.5px solid var(--border);border-radius:18px;padding:44px 48px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.08)}
.brand-icon{width:38px;height:38px;background:var(--blue-gen);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2}
.btn-primary, .btn-process{width:100%;padding:11px;background:var(--blue-gen);color:#fff;border:none;border-radius:var(--radius);font-weight:600;cursor:pointer}
#screen-app{display:none}
.topnav{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 32px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tabs{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 32px;display:flex;gap:0}
.tab{font-size:13px;padding:12px 18px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--blue-gen);border-bottom-color:var(--blue-gen);font-weight:600}
.container{max-width:1400px;margin:0 auto;padding:28px 32px}
.krow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.kpi-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:12px}
.upload-box{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:24px;text-align:center;position:relative}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
table.dt th{padding:8px;text-align:left;background:var(--bg2);color:var(--text2);text-transform:uppercase;font-size:9px}
table.dt td{padding:8px;border-bottom:0.5px solid var(--border)}
</style>
</head>
<body>

<div id="screen-login">
    <div class="login-card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:30px">
            <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div>
            <strong>Genomma Lab | Torre de Controle</strong>
        </div>
        <input type="email" id="l-email" placeholder="E-mail" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ddd">
        <input type="password" id="l-pass" placeholder="Senha" style="width:100%;padding:10px;margin-bottom:20px;border-radius:8px;border:1px solid #ddd">
        <button class="btn-primary" onclick="doLogin()">Entrar</button>
        <p id="login-err" style="color:red;display:none;margin-top:10px"></p>
    </div>
</div>

<div id="screen-app">
    <div class="topnav">
        <div style="display:flex;align-items:center;gap:10px">
            <div class="brand-icon" style="width:30px;height:30px"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0
