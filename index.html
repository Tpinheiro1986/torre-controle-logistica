<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Logística</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;--text:#1a1a18;--text2:#6b6b67;--blue:#185FA5;--radius:8px;--radius-lg:14px}
body{font-family:system-ui,sans-serif;background:var(--bg3);color:var(--text);margin:0;font-size:13px}
#screen-login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:white;padding:40px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,0.1);width:350px}
#screen-app{display:none}
.topnav{background:white;padding:15px 30px;display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,0.1)}
.tabs{background:white;display:flex;padding:0 30px;border-bottom:1px solid rgba(0,0,0,0.1)}
.tab{padding:15px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:bold}
.container{max-width:1200px;margin:20px auto;padding:0 20px}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.kpi{background:white;padding:20px;border-radius:var(--radius);border:1px solid rgba(0,0,0,0.05)}
.kpi-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:5px}
.kpi-val{font-size:26px;font-weight:bold}
.card{background:white;padding:25px;border-radius:var(--radius-lg);border:1px solid rgba(0,0,0,0.05)}
.upload-box{border:2px dashed #ccc;padding:40px;text-align:center;border-radius:14px;cursor:pointer;position:relative;margin:20px 0}
.upload-box:hover{border-color:var(--blue);background:#f0f7ff}
input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn{background:var(--blue);color:white;border:none;padding:12px 25px;border-radius:8px;font-weight:bold;cursor:pointer;width:100%}
#log-area{background:#f8f8f8;padding:10px;border-radius:5px;font-family:monospace;font-size:11px;margin-top:15px;max-height:150px;overflow-y:auto;display:none}
</style>
</head>
<body>

<div id="screen-login">
    <div class="login-card">
        <h2 style="margin-bottom:20px">Entrar</h2>
        <input type="email" id="l-email" placeholder="E-mail" style="width:100%;padding:10px;margin-bottom:10px">
        <input type="password" id="l-pass" placeholder="Senha" style="width:100%;padding:10px;margin-bottom:10px">
        <button class="btn" onclick="doLogin()">Acessar Painel</button>
    </div>
</div>

<div id="screen-app">
    <div class="topnav">
        <strong>Torre de Controle - Logística</strong>
        <button onclick="doLogout()" style="background:none;border:none;color:red;cursor:pointer">Sair</button>
    </div>
    <div class="tabs">
        <div class="tab on" onclick="switchTab('otd',this)">Painel OTD</div>
        <div id="tab-upload" class="tab" style="display:none" onclick="switchTab('upload',this)">⬆ Upload de Dados</div>
    </div>

    <div class="container">
        <div id="sec-otd" class="dash-section on">
            <div class="krow">
                <div class="kpi"><div class="kpi-lbl">Total Faturado</div><div class="kpi-val" id="kpi-fat">R$ 0,00</div></div>
                <div class="kpi"><div class="kpi-lbl">On Time</div><div class="kpi-val" id="kpi-on" style="color:green">0</div></div>
                <div class="kpi"><div class="kpi-lbl">Off Time</div><div class="kpi-val" id="kpi-off" style="color:red">0</div></div>
                <div class="kpi"><div class="kpi-lbl">OTD %</div><div class="kpi-val" id="kpi-otd">0%</div></div>
            </div>
            <div class="card"><canvas id="otdChart" height="100"></canvas></div>
        </div>

        <div id="sec-upload" class="upload-section" style="display:none">
            <div class="card">
                <h3>Carregar Nova Base</h3>
                <p>Arraste o arquivo <strong>grid-atividade-entrega.xlsx</strong> abaixo:</p>
                <div class="upload-box">
                    <input type="file" id="file-input" accept=".xlsx,.csv">
                    <p id="file-name">Clique ou arraste o arquivo aqui</p>
                </div>
                <button class="btn" onclick="processarExcel()">Processar e Atualizar Gráficos</button>
                <div id="log-area"></div>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ennsbpibfnuwlvtodukg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_ExShUMyhsoGRab_RdySuZg_1uqONyI5';
const ADMIN_EMAIL = 'thiago_balao@yahoo.com.br';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let chartInstance = null;

async function doLogin() {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if(error) alert("Erro: " + error.message);
}

function showApp(user) {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-app').style.display = 'block';
    if(user.email === ADMIN_EMAIL) document.getElementById('tab-upload').style.display = 'block';
}

async function doLogout() { await sb.auth.signOut(); location.reload(); }

function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    el.classList.add('on');
    document.getElementById('sec-otd').style.display = id === 'otd' ? 'block' : 'none';
    document.getElementById('sec-upload').style.display = id === 'upload' ? 'block' : 'none';
}

document.getElementById('file-input').addEventListener('change', (e) => {
    if(e.target.files[0]) document.getElementById('file-name').innerHTML = "<b>Arquivo selecionado:</b> " + e.target.files[0].name;
});

function addLog(msg) {
    const log = document.getElementById('log-area');
    log.style.display = 'block';
    log.innerHTML += "> " + msg + "<br>";
}

function processarExcel() {
    const file = document.getElementById('file-input').files[0];
    if(!file) return alert("Selecione um arquivo!");
    
    addLog("Iniciando leitura do arquivo...");
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            
            addLog("Linhas encontradas: " + json.length);
            
            if(json.length === 0) throw new Error("A planilha está vazia!");
            
            atualizarDashboards(json);
            addLog("Sucesso! Painel atualizado.");
            setTimeout(() => switchTab('otd', document.querySelector('.tab')), 1500);
            
        } catch (err) {
            addLog("ERRO: " + err.message);
            console.error(err);
        }
    };
    reader.readAsArrayBuffer(file);
}

function atualizarDashboards(data) {
    let fat = 0, on = 0, off = 0;

    data.forEach((row, i) => {
        // Tenta achar o valor em diferentes nomes de coluna possíveis
        const v = row['Valor'] || row['Faturamento'] || row['Valor Total'] || row['Vlr'] || 0;
        fat += parseFloat(v);

        // Tenta achar o status em diferentes nomes
        const s = String(row['Status OTD'] || row['Status'] || row['Situação'] || "").toLowerCase();
        if(s.includes('prazo') || s.includes('on') || s.includes('entregue')) on++;
        else off++;
    });
