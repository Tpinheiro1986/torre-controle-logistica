<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle — Logística</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#fff;--bg2:#f5f5f3;--text:#1a1a18;--border:rgba(0,0,0,0.1);--radius:8px;}
body{font-family:system-ui,sans-serif;background:#eeede8;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
#screen-login{background:white;padding:40px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,0.1);width:100%;max-width:350px}
.form-group{margin-bottom:15px}
label{display:block;font-size:11px;font-weight:600;margin-bottom:5px;text-transform:uppercase}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:var(--radius);box-sizing:border-box}
button{width:100%;padding:12px;background:#185FA5;color:white;border:none;border-radius:var(--radius);cursor:pointer;font-weight:bold}
#login-err{color:red;font-size:12px;margin-top:10px;display:none;text-align:center}
#screen-app{display:none;width:100vw;height:100vh;background:white;padding:20px}
</style>
</head>
<body>

<div id="screen-login">
    <h2 style="margin-top:0">Login</h2>
    <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="l-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
        <label>Senha</label>
        <input type="password" id="l-pass" placeholder="••••••••">
    </div>
    <button id="btn-login" onclick="doLogin()">Entrar</button>
    <div id="login-err"></div>
</div>

<div id="screen-app">
    <h1>Torre de Controle Ativa</h1>
    <p>Bem-vindo, <span id="user-display"></span></p>
    <button onclick="doLogout()" style="width:100px">Sair</button>
</div>

<script>
// CONFIGURAÇÃO - VERIFIQUE SE ESTÃO IGUAIS AO SEU PAINEL
const SUPABASE_URL = 'https://ennsbpibfnuwlvtodukg.supabase.co';
const SUPABASE_ANON = 'sb_publishable_ExShUMyhsoGRab_RdySuZg_1uqONyI5';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

async function doLogin() {
    const email = document.getElementById('l-email').value;
    const pass = document.getElementById('l-pass').value;
    const btn = document.getElementById('btn-login');
    const errDiv = document.getElementById('login-err');

    btn.disabled = true;
    btn.textContent = 'Processando...';
    errDiv.style.display = 'none';

    try {
        const { data, error } = await sb.auth.signInWithPassword({
            email: email,
            password: pass,
        });

        if (error) throw error;

        if (data.user) {
            showApp(data.user);
        }
    } catch (err) {
        console.error("Erro no Login:", err.message);
        errDiv.textContent = "Erro: " + err.message;
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
}

function showApp(user) {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-app').style.display = 'block';
    document.getElementById('user-display').textContent = user.email;
}

async function doLogout() {
    await sb.auth.signOut();
    location.reload();
}

// Verifica se já está logado ao abrir a página
sb.auth.onAuthStateChange((event, session) => {
    if (session) showApp(session.user);
});
</script>
</body>
</html>
