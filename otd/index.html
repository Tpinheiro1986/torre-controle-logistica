<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL  = 'https://ennsbpibfnuwlvtodukg.supabase.co';
const SUPABASE_ANON = 'COLE_AQUI_SUA_CHAVE_CORRETA_DO_SUPABASE'; // IMPORTANTE
const ADMIN_EMAIL   = 'thiago_balao@yahoo.com.br';

const { createClient } = supabase;

const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    flowType: 'implicit',
    storageKey: 'torre-controle-auth'
  }
});

// ============================================================
// AUTH
// ============================================================
let currentUser = null;

async function checkSession(){
  try{
    // limpa hash do supabase (evita bug de reload)
    if(window.location.hash && window.location.hash.includes('access_token')){
      window.history.replaceState(null,'',window.location.pathname);
    }

    const { data: { session }, error } = await sb.auth.getSession();

    if(error){
      console.error('Erro sessão:', error);
      showLogin();
      return;
    }

    if(!session){
      console.warn('Sem sessão ativa');
      showLogin();
      return;
    }

    console.log('Sessão OK:', session.user.email);
    showApp(session.user);

  }catch(e){
    console.error('Erro geral sessão:', e);
    showLogin();
  }
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.getElementById('btn-login');
  const err=document.getElementById('login-err');

  err.style.display='none';

  if(!email||!pass){
    showErr(err,'Preencha e-mail e senha.');
    return;
  }

  btn.disabled=true;
  btn.textContent='Entrando…';

  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

    if(error){
      showErr(err,'E-mail ou senha incorretos.');
      btn.disabled=false;
      btn.textContent='Entrar';
      return;
    }

    localStorage.setItem('logged_in', 'true');

    showApp(data.user);

  }catch(e){
    showErr(err,'Erro: '+e.message);
    btn.disabled=false;
    btn.textContent='Entrar';
  }
}

async function doLogout(){
  await sb.auth.signOut();
  localStorage.removeItem('logged_in');
  showLogin();
}

function showLogin(){
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('screen-app').style.display='none';
}

function showApp(user){
  currentUser = user;

  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='block';

  document.getElementById('user-av').textContent = user.email.slice(0,2).toUpperCase();
  document.getElementById('user-em').textContent  = user.email;

  if(user.email === ADMIN_EMAIL){
    document.getElementById('admin-badge').style.display='inline-block';
  }

  loadOTDFromStorage();
}

function showErr(el,msg){
  el.textContent=msg;
  el.style.display='block';
}

// listener global auth
sb.auth.onAuthStateChange((event, session)=>{
  if(event==='SIGNED_IN' && session){
    showApp(session.user);
  }
  if(event==='SIGNED_OUT'){
    showLogin();
  }
});

// inicia
checkSession();

// ============================================================
// TABS (CORRIGIDO - SEM CONFLITO)
// ============================================================
const TABS = {
  otd:'sec-otd',
  transp:'sec-transp',
  offtime:'sec-offtime'
};

function switchTab(id, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));

  Object.values(TABS).forEach(s=>{
    const el=document.getElementById(s);
    if(el){
      el.classList.remove('on');
      el.style.display='none';
    }
  });

  btn.classList.add('on');

  const sec = document.getElementById(TABS[id]);
  if(sec){
    sec.classList.add('on');
    sec.style.display='block';
  }

  if(id==='transp'){ renderTransp(); }
  if(id==='offtime'){ renderOffTime(); }
}

// init
Object.entries(TABS).forEach(([k,v])=>{
  const el=document.getElementById(v);
  if(el && k!=='otd'){
    el.style.display='none';
  }
});
</script>
